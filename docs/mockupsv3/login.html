<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — BScout</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-layout {
      display: flex;
      min-height: 100vh;
    }

    .auth-image {
      flex: 0 0 37.5%;
      background: url('../img/auth.webp') center/cover no-repeat;
      border-right: 1px solid var(--border-light);
      display: none;
    }

    @media (min-width: 769px) {
      .auth-image {
        display: block;
      }
    }

    .auth-form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-48) var(--space-40);
      background: var(--ivory);
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
    }

    .auth-card h1 {
      font-size: 32px;
      margin-bottom: var(--space-8);
    }

    .auth-card .subheading {
      margin-bottom: var(--space-32);
    }

    .auth-divider {
      text-align: center;
      color: var(--body-muted);
      font-size: 14px;
      margin: var(--space-24) 0;
      position: relative;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 24px);
      height: 1px;
      background: var(--border-light);
    }

    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    @media (max-width: 768px) {
      .auth-form-side {
        flex: 1;
        padding: var(--space-32) var(--space-20);
      }
    }
  </style>
</head>
<body>

<header class="site-header" id="header">
  <div class="container header-inner">
    <a href="index.html" class="header-logo">
      <img src="../img/Logo.svg" alt="BScout" style="height: 48px; width: auto; filter: brightness(0) contrast(100);">
    </a>
    <nav class="header-nav">
      <a href="search.html">Поиск</a>
      <a href="tariffs.html">Тарифы</a>
      <a href="faq.html">FAQ</a>
      <a href="contacts.html">Контакты</a>
    </nav>
    <div class="header-actions">
      <a href="register.html" class="btn btn-primary btn-sm">Регистрация</a>
      <button class="mobile-menu-btn" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="auth-layout">
  <div class="auth-image"></div>
  <div class="auth-form-side">
    <div class="auth-card">
      <h1>Вход</h1>
      <p class="subheading">Войдите в аккаунт для доступа к поиску</p>

      <form>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="example@email.com">
        </div>
        <div class="input-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" class="input" placeholder="Введите пароль">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-24);">
          <label class="checkbox">
            <input type="checkbox">
            <span class="checkbox-box"></span>
            Запомнить меня
          </label>
          <a href="#" style="font-size: 14px; color: var(--body-subtle);">Забыли пароль?</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="text-decoration: none;">Войти</button>
      </form>

      <div class="auth-divider">или</div>

      <div style="display: flex; gap: var(--space-12);">
        <button class="btn btn-secondary w-full" style="justify-content: center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 9v6"/><path d="M9 12h6"/></svg>
          ВКонтакте
        </button>
        <button class="btn btn-secondary w-full" style="justify-content: center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
          Телеграм
        </button>
      </div>

      <p class="caption text-center" style="margin-top: var(--space-24);">
        Нет аккаунта? <a href="register.html" style="color: var(--slate); font-weight: 500;">Зарегистрироваться</a>
      </p>
    </div>
  </div>
</div>

<script>
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 10);
  });
</script>
</body>
</html>
