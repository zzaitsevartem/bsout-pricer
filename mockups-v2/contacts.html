<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — BScout Cloud</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="cloud-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="header-logo">
      <span class="logo-icon">B</span>
      BScout
    </a>
    <nav class="header-nav">
      <a href="search.html">Поиск</a>
      <a href="tariffs.html">Тарифы</a>
      <a href="faq.html">FAQ</a>
      <a href="contacts.html">Контакты</a>
    </nav>
    <div class="header-actions">
      <a href="account.html" class="header-icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="register.html" class="btn btn-primary btn-sm">Регистрация</a>
    </div>
  </div>
</header>

<div class="container" style="padding-top: var(--space-48); padding-bottom: var(--space-80);">
  <div class="breadcrumbs">
    <a href="index.html">Главная</a>
    <span class="sep">/</span>
    <span>Контакты</span>
  </div>

  <div class="page-header text-center" style="max-width: 500px; margin: 0 auto var(--space-40);">
    <p class="section-eyebrow">Контакты</p>
    <h1>Свяжитесь с нами</h1>
    <p class="subheading">Есть вопросы? Напишите нам!</p>
  </div>

  <div class="contacts-grid">
    <div>
      <div class="contact-info-item">
        <div class="contact-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M22 6l-10 7L2 6"/></svg>
        </div>
        <div>
          <h5>Email</h5>
          <p>hello@bscout.cloud</p>
          <p>support@bscout.cloud</p>
        </div>
      </div>
      <div class="contact-info-item">
        <div class="contact-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <div>
          <h5>Телефон</h5>
          <p>+7 (999) 123-45-67</p>
          <p class="caption">Пн–Пт, 09:00–18:00</p>
        </div>
      </div>
      <div class="contact-info-item">
        <div class="contact-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <h5>Адрес</h5>
          <p>г. Ставрополь, ул. Ленина, 123</p>
        </div>
      </div>
    </div>

    <div>
      <div class="card card-glass" style="padding: var(--space-24);">
        <h4 style="margin-bottom: var(--space-16);">Напишите нам</h4>
        <form>
          <div class="input-group">
            <label for="name">Имя</label>
            <input type="text" id="name" class="input" placeholder="Ваше имя">
          </div>
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="input" placeholder="your@email.com">
          </div>
          <div class="input-group">
            <label for="subject">Тема</label>
            <input type="text" id="subject" class="input" placeholder="Чем мы можем помочь?">
          </div>
          <div class="input-group">
            <label for="message">Сообщение</label>
            <textarea id="message" class="input" rows="4" placeholder="Ваше сообщение..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full">Отправить</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
