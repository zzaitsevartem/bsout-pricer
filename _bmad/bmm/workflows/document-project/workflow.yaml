name: Документирование проекта
description: Создание или обновление документации для brownfield-проекта
purpose: Задокументировать существующую кодовую базу: архитектуру, модули, API, процессы
triggers:
  - Онбординг новой команды
  - Анализ существующего проекта
  - Аудит документации
inputs:
  - Исходный код проекта
  - README / существующая документация
  - Git-история
  - Знания команды
outputs:
  - Документация проекта
  - Карта модулей и зависимостей
roles:
  tech_lead: Валидация документации
  developer: Сбор информации
steps:
  - name: Сканирование кодовой базы
    action: Проанализировать структуру директорий, конфиги, ключевые файлы
    description: Определить технологический стек и layering

  - name: Интервью с командой
    action: Провести обсуждение с разработчиками о назначении модулей и архитектуре
    description: Собрать знания, не отражённые в коде

  - name: Картирование модулей
    action: Построить диаграмму модулей и их зависимостей
    description: Определить границы ответственности каждого модуля

  - name: Документирование API
    action: Описать внутренние и внешние API, контракты, протоколы
    description: Зафиксировать эндпоинты, форматы запросов/ответов

  - name: Описание процессов
    action: Документировать инфраструктурные процессы: CI/CD, деплой, мониторинг
    description: Описать шаги развёртывания и требования к окружению

  - name: Рецензирование
    action: Провести ревью документации с командой
    description: Исправить неточности, дополнить пропуски

  - name: Публикация
    action: Разместить документацию в docs/ или wiki
    description: Обеспечить доступность для всей команды
