name: Реализация Story
description: Выполнение задачи разработчиком согласно спецификации
purpose: Реализовать story от начала до готовности к code review
triggers:
  - Story назначена на разработчика в спринте
inputs:
  - Story-файл с контекстом
  - Репозиторий проекта
  - Доступ к dev-среде
outputs:
  - Рабочий код в feature-ветке
  - Тесты
roles:
  developer: Исполнитель
  tech_lead: Консультация
steps:
  - name: Анализ задачи
    action: Прочитать story-файл, acceptance criteria, технический контекст. Задать уточняющие вопросы
    description: Убедиться, что задача полностью понятна

  - name: Создание ветки
    action: Создать feature-ветку от актуального main/develop
    description: Ветка именуется по шаблону: bsout-XXX-kratkoe-opisanie

  - name: Реализация
    action: Написать код, покрывающий acceptance criteria. Следовать архитектурным решениям и code style
    description: Выполнять частые коммиты с осмысленными сообщениями

  - name: Написание тестов
    action: Покрыть новую функциональность unit/integration тестами. Проверить негативные сценарии
    description: Минимальное покрытие — 80% нового кода

  - name: Самопроверка
    action: Проверить код линтером, запустить тесты, проверить вручную на dev-стенде
    description: Убедиться, что сборка проходит и тесты зелёные

  - name: Открытие Merge Request
    action: Создать MR с описанием изменений и ссылкой на story
    description: Назначить ревьюера (Tech Lead или старшего разработчика)
