name: Коррекция курса
description: Управление значительными изменениями в ходе спринта: change request, блокеры, форс-мажор
purpose: Минимизировать потери от изменений и сохранить фокус команды
triggers:
  - Изменение scope в спринте
  - Критический блокер
  - Новые требования от стейкхолдеров
inputs:
  - Текущий Sprint Backlog
  - Запрос на изменение
  - Бизнес-обоснование
outputs:
  - Обновлённый Sprint Backlog
  - Решение: continue / pivot / abort
roles:
  scrum_master: Фасилитатор процесса
  product_manager: Принятие решения
  tech_lead: Оценка impact
steps:
  - name: Идентификация изменения
    action: Зафиксировать запрос на изменение. Описать суть, причину, срочность
    description: Определить источник: стейкхолдер, баг, внешние факторы

  - name: Оценка влияния
    action: Tech Lead оценивает impact на: текущие задачи, архитектуру, тесты, дедлайны
    description: Product Manager оценивает бизнес-ценность изменения

  - name: Анализ опций
    action: Рассмотреть варианты: принять изменение, отложить, заменить другую задачу
    description: Взвесить стоимость и выгоду каждого варианта

  - name: Принятие решения
    action: Product Manager принимает решение. Scrum Master фиксирует в протоколе
    description: При изменении scope — скорректировать Sprint Goal

  - name: Корректировка бэклога
    action: Обновить Sprint Backlog: добавить/удалить/переоценить задачи
    description: Перераспределить задачи между участниками

  - name: Коммуникация
    action: Уведомить команду и стейкхолдеров о решении и новом плане
    description: Обновить статус-отчёт и дашборд спринта
