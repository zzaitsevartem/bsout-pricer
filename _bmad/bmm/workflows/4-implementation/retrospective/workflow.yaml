name: Ретроспектива
description: Анализ завершённого эпика: что прошло хорошо, что можно улучшить, план действий
purpose: Извлечь уроки и улучшить процессы команды
triggers:
  - Завершение эпика
  - Окончание крупной вехи
inputs:
  - Sprint-отчёты за период
  - Метрики: velocity, defect rate, cycle time
  - Обратная связь от команды
outputs:
  - Протокол ретроспективы
  - План улучшений (Action Items)
roles:
  scrum_master: Фасилитатор
  product_manager: Участие
  development_team: Основные участники
steps:
  - name: Подготовка
    action: Собрать метрики и артефакты за период. Подготовить таймлайн событий
    description: Создать безопасное пространство для открытого обсуждения

  - name: Сбор фактов
    action: Пройти по таймлайну эпика. Отметить ключевые события: задержки, успехи, проблемы
    description: Каждый участник добавляет свои наблюдения

  - name: Что прошло хорошо
    action: Выявить практики, которые сработали успешно. Зафиксировать для повторения
    description: Отметить достижения команды

  - name: Что можно улучшить
    action: Идентифицировать проблемы и узкие места. Провести root cause analysis
    description: Без обвинений — фокус на процессах

  - name: План действий
    action: Сформулировать конкретные action items с владельцами и сроками
    description: Не более 3-5 пунктов на следующий цикл

  - name: Итог
    action: Опубликовать протокол. Назначить ответственных за action items
    description: Проверить выполнение на следующей ретроспективе
