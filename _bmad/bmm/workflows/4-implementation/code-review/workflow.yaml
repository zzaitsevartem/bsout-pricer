name: Code Review
description: Состязательное ревью кода для выявления дефектов, уязвимостей и нарушений архитектуры
purpose: Обеспечить качество кода и соответствие стандартам проекта
triggers:
  - Открыт Merge Request разработчиком
inputs:
  - Merge Request с кодом
  - Story-файл с требованиями
  - Стандарты кодирования
outputs:
  - Approved MR / Запрос изменений
  - Список замечаний
roles:
  reviewer: Ревьюер (Tech Lead / старший разработчик)
  developer: Автор кода
steps:
  - name: Ознакомление с MR
    action: Прочитать описание MR, связанную story, acceptance criteria
    description: Понять контекст и scope изменений

  - name: Проверка архитектуры
    action: Оценить соответствие архитектурным решениям, нет ли нарушения слоёв или паттернов
    description: Проверить, не вносит ли код технический долг

  - name: Проверка корректности
    action: Проверить логику, обработку ошибок, граничные случаи, race conditions
    description: Убедиться, что код корректно работает во всех сценариях

  - name: Проверка тестов
    action: Оценить полноту тестового покрытия, качество тестов, наличие негативных кейсов
    description: Проверить, что тесты действительно проверяют требуемое поведение

  - name: Проверка code style
    action: Проверить соответствие code style, именование, форматирование, импорты
    description: Убедиться, что линтер не выдаёт ошибок

  - name: Формирование заключения
    action: Написать комментарии к MR. Вынести вердикт: Approve / Changes requested
    description: Аргументировать каждое замечание. При Approve — смержить ветку
