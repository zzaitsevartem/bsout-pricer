name: Статус спринта
description: Формирование сводки о состоянии спринта для команды и стейкхолдеров
purpose: Обеспечить прозрачность прогресса и выявить блокеры
triggers:
  - Еженедельный статус
  - Запрос стейкхолдера
inputs:
  - Sprint Backlog
  - Данные таск-трекера
  - Чат команды
outputs:
  - Отчёт о статусе спринта
  - График сгорания (burndown)
roles:
  scrum_master: Составление отчёта
  development_team: Обновление статусов задач
steps:
  - name: Сбор данных
    action: Получить актуальные статусы задач из трекера (To Do / In Progress / Done)
    description: Учесть выполненные, в работе и заблокированные задачи

  - name: Анализ прогресса
    action: Сравнить фактические трудозатраты с запланированными. Построить burndown
    description: Выявить отклонения от графика

  - name: Выявление блокеров
    action: Собрать блокеры и impediments от команды. Оценить влияние на цель спринта
    description: Определить действия по устранению

  - name: Риски и изменения
    action: Задокументировать изменившиеся риски и scope changes
    description: Оценить необходимость коррекции курса

  - name: Формирование отчёта
    action: Подготовить статус-отчёт: сделанное, планы, блокеры, риски
    description: Краткий формат для daily standup и расширенный для стейкхолдеров

  - name: Коммуникация
    action: Отправить отчёт команде и стейкхолдерам. Обновить дашборд
    description: Провести статус-митинг при необходимости
