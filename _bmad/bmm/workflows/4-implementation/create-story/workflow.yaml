name: Создание Story-файла
description: Формирование файла задачи с полным контекстом для реализации
purpose: Обеспечить разработчика всей необходимой информацией для выполнения задачи
triggers:
  - Готовность эпика к декомпозиции
  - Планирование спринта
inputs:
  - user_story с критериями приёмки
  - UX-макеты
  - Архитектурные решения
outputs:
  - Story-файл (.story.md)
roles:
  product_manager: Владелец процесса
  tech_lead: Валидация контекста
steps:
  - name: Определение заголовка и контекста
    action: Создать заголовок story, описание бизнес-ценности и ссылки на PRD/эпик
    description: Заполнить мета-информацию (приоритет, теги, оценка)

  - name: Описание技术要求
    action: Добавить технический контекст: архитектурные решения, затронутые модули, API
    description: Указать зависимости от других задач и инфраструктурные требования

  - name: Критерии приёмки
    action: Перенести acceptance criteria из user story, дополнить техническими check-ами
    description: Описать тестовые сценарии, граничные случаи, критерии готовности

  - name: UX-референсы
    action: Прикрепить ссылки на макеты, прототипы, user flows
    description: Указать дизайн-спецификации и требования к UI

  - name: Финальная валидация
    action: Провести ревью story-файла с Tech Lead и Product Manager
    description: Утвердить Definition of Ready и передать в бэклог спринта
