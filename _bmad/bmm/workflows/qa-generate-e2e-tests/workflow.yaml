name: Генерация E2E-тестов
description: Создание end-to-end тестов для существующей функциональности проекта
purpose: Обеспечить регрессионное покрытие ключевых пользовательских сценариев
triggers:
  - Добавление новой функциональности
  - Выявление дефектов в регрессии
  - Аудит тестового покрытия
inputs:
  - PRD / user stories
  - Существующие тесты
  - Описание пользовательских сценариев
  - Тестовая среда
outputs:
  - Набор E2E-тестов
  - Отчёт о покрытии
roles:
  qa_engineer: Разработка тестов
  developer: Консультация по реализации
steps:
  - name: Анализ функциональности
    action: Изучить требования, UI-макеты, user flows для тестируемой фичи
    description: Выделить ключевые пользовательские сценарии

  - name: Определение тестовых сценариев
    action: Описать happy path, error path, граничные случаи, интеграционные сценарии
    description: Приоритизировать по критичности функциональности

  - name: Подготовка тестовых данных
    action: Создать или запросить тестовые данные: пользователи, моки, фикстуры
    description: Обеспечить изолированность тестов

  - name: Написание тестов
    action: Реализовать E2E-тесты на выбранном фреймворке (Playwright/Cypress)
    description: Следовать правилам: Page Object, атомарность, независимость

  - name: Запуск и отладка
    action: Запустить тесты в CI-окружении. Исправить flaky-тесты
    description: Добиться стабильного прохождения всех тестов

  - name: Интеграция в CI/CD
    action: Добавить тесты в пайплайн, настроить отчёты и алерты
    description: Включить в critical path для блокировки релиза при падении

  - name: Документирование
    action: Описать тестовые сценарии, настройки и инструкции по запуску
    description: Обновить тестовую документацию
