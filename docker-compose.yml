version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bscout-postgres
    environment:
      POSTGRES_DB: bscout
      POSTGRES_USER: bscout
      POSTGRES_PASSWORD: bscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bscout-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
